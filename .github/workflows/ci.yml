name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  sqlc-drift:
    name: sqlc Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Check sqlc drift
        run: |
          sqlc generate
          git diff --exit-code internal/sqlc/

  templ-css-drift:
    name: templ/CSS Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ
        run: templ generate

      - name: Check templ drift
        run: git diff --exit-code web/templates/

      - name: Build CSS
        run: ./tailwindcss-linux-x64 -i web/assets/input.css -o web/static/css/style.css --minify

      - name: Check CSS drift
        run: git diff --exit-code web/static/css/style.css

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gostarter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: gostarter_test
          DB_SSL_MODE: disable
          REDIS_ADDR: localhost:6379
          JWT_SECRET: test-jwt-secret-ci
          SESSION_SECRET: test-session-secret-ci
          APP_ENV: test
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, sqlc-drift, templ-css-drift]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        run: |
          go build -o bin/api ./cmd/api
          go build -o bin/worker ./cmd/worker
          go build -o bin/migrate ./cmd/migrate

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, sqlc-drift, templ-css-drift]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f deployments/Dockerfile -t go-starter:ci .
